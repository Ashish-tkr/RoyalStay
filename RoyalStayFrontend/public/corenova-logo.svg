<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <!-- Gold starburst circle -->
  <g transform="translate(150, 150) scale(1.2)">
    <!-- Rays -->
    <g fill="#FFD700">
      <!-- 36 rays at 10 degree intervals -->
      <path d="M0,0 L80,0" transform="rotate(0)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(10)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(20)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(30)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(40)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(50)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(60)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(70)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(80)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(90)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(100)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(110)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(120)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(130)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(140)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(150)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(160)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(170)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(180)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(190)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(200)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(210)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(220)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(230)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(240)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(250)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(260)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(270)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(280)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(290)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(300)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(310)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(320)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(330)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(340)" stroke="#FFD700" stroke-width="4" />
      <path d="M0,0 L80,0" transform="rotate(350)" stroke="#FFD700" stroke-width="4" />
    </g>
    
    <!-- Star in the center -->
    <path fill="#FFD700" d="M0,-15 L5,0 L20,0 L8,10 L12,25 L0,15 L-12,25 L-8,10 L-20,0 L-5,0 Z" />
  </g>
  
  <!-- CORENOVA text -->
  <text x="300" y="160" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#002366">CORENOVA</text>
  
  <!-- AGENCY PVT. LTD. text -->
  <text x="460" y="200" font-family="Arial, sans-serif" font-size="20" letter-spacing="5" fill="#002366">AGENCY PVT. LTD.</text>
